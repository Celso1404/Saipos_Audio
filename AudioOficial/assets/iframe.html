<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gravador de Áudio</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
    }
    button {
      margin: 5px;
      padding: 8px 12px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h2 class="u-semibold u-fs-xl">🎙️ Gravar Áudio para WhatsApp</h2>
  
  <button id="record">Iniciar Gravação</button>
  <button id="stop" disabled>Parar Gravação</button>
  <audio id="audioPlayer" controls style="display:none; margin-top: 10px;"></audio>

  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
  <script>
    let recorder;
    let audioChunks = [];

    const recordBtn = document.getElementById("record");
    const stopBtn = document.getElementById("stop");
    const player = document.getElementById("audioPlayer");

    recordBtn.onclick = async () => {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recorder = new MediaRecorder(stream);
      audioChunks = [];

      recorder.ondataavailable = (e) => audioChunks.push(e.data);
      recorder.onstop = sendAudio;

      recorder.start();
      recordBtn.disabled = true;
      stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {
      recorder.stop();
      recordBtn.disabled = false;
      stopBtn.disabled = true;
    };

    async function sendAudio() {
      const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
      const audioUrl = URL.createObjectURL(audioBlob);
      player.src = audioUrl;
      player.style.display = "block";

      const convertedUrl = await uploadToStorage(audioBlob);
      if (convertedUrl) {
        sendMessageToZendesk(convertedUrl);
      }
    }

    async function uploadToStorage(blob) {
      const formData = new FormData();
      formData.append("audio", blob, "audio.ogg");

      try {
        const response = await fetch("http://localhost:3000/api/convert", {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          throw new Error("Erro ao enviar áudio");
        }

        const json = await response.json();
        return json.downloadUrl;
      } catch (err) {
        console.error("Erro no upload:", err);
        return null;
      }
    }

    function sendMessageToZendesk(audioURL) {
      // Exemplo: enviar como comentário no ticket ou mensagem no widget
      alert("Link gerado:\n" + audioURL);

      // Se quiser enviar via widget:
      // zE('messenger', 'send', {
      //   type: 'text',
      //   text: `🎧 Você recebeu um áudio: ${audioURL}`
      // });
    }
  </script>
</body>
</html>
